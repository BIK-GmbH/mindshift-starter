<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Mindshift — Token-Health preview</title>
    <link rel="stylesheet" href="../popup.css" />
    <style>
      body { padding: 24px; gap: 16px; display: flex; flex-direction: column; }
      .label { font-size: 12px; color: #8b94a8; margin: 0 0 6px; }
    </style>
  </head>
  <body>
    <div>
      <p class="label">State 1 — token has &gt; 7 days of life. Pill is hidden.</p>
      <div id="state1" class="token-health hidden"></div>
    </div>

    <div>
      <p class="label">State 2 — token expires in 3 days. Amber warning.</p>
      <div id="state2" class="token-health warn">
        <span class="token-health-dot"></span>
        <span>Token expires in 3 days — open <strong>Settings</strong> to refresh.</span>
      </div>
    </div>

    <div>
      <p class="label">State 3 — token expired. Red banner.</p>
      <div id="state3" class="token-health expired">
        <span class="token-health-dot"></span>
        <span>Token expired — click <strong>Settings</strong> to reconnect.</span>
      </div>
    </div>
  </body>
</html>
